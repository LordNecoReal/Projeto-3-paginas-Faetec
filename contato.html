<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Meu Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 40px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: auto; /* Centraliza o container */
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* Estilo para o Menu de Navegação */
        nav {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #007BFF;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }

        h1 { color: #333; }
        .info { margin-bottom: 20px; }
        .info p { margin: 5px 0; }
        strong { color: #007BFF; }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <a href="../index.html">Início</a>
            <a href="sobre.html">Sobre</a>
            <a href="contato.html">Contato</a>
        </nav>

        <h1>Entre em Contato</h1>
        <p>Fique à vontade para nos enviar uma mensagem ou visitar nosso escritório.</p>
        
        <hr>

        <div class="info">
            <p><strong>📍 Endereço:</strong> Rua Exemplo, 123 - Bairro Centro, Cidade - UF</p>
            <p><strong>📧 E-mail:</strong> contato@seudominio.com.br</p>
            <p><strong>📞 Telefone:</strong> (11) 98765-4321</p>
        </div>

        <hr>

        <h3>Envie uma mensagem</h3>
        <form action="#">
            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome" style="width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box;"><br>
            
            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" style="width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box;"><br>
            
            <label for="msg">Mensagem:</label><br>
            <textarea id="msg" name="msg" rows="4" style="width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box;"></textarea><br>
            
            <button type="submit" style="background: #007BFF; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; width: 100%;">Enviar</button>
        </form>
    </div>

</body>
</html>
